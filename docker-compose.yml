version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/app/datasets
      - ./ml/weights:/app/ml/weights
      - ./pdds.db:/app/pdds.db
    environment:
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
